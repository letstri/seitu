library:
  name: seitu
  version: 0.16.0
  repository: https://github.com/letstri/seitu
  description: Type-safe reactive primitives with a shared get/subscribe API for core, web, React, Vue, Solid, and Svelte.
  primary_framework: framework-agnostic
coverage:
  ignored_packages:
    - name: docs
      reason: Internal documentation site, not a publishable SDK
    - name: playground
      reason: Example app, not a client-facing package
domains:
  - name: reactive state
    slug: reactive-state
    description: In-memory stores, schema validation, derived values, and rate limiting on subscribables.
  - name: browser integration
    slug: browser-integration
    description: Persistence, DOM APIs, and SSR-safe defaults for web environments.
  - name: framework bindings
    slug: framework-bindings
    description: React, Vue, Solid, and Svelte bindings that subscribe to any Seitu primitive.
  - name: library orientation
    slug: orientation
    description: Module map, mental model, and primitive selection for new adopters.
skills:
  - name: seitu-overview
    slug: seitu-overview
    domain: orientation
    description: Read first — module map, mental model, decision tree, SSR notes.
    type: lifecycle
    packages:
      - seitu
    covers:
      - module imports
      - composition pattern
      - SSR defaults
    tasks:
      - choose the right primitive
      - understand the shared get/subscribe API
      - integrate Seitu in a new app
    failure_modes:
      - mistake: Using useState for shared module-level state
        mechanism: Seitu primitives are singletons at module scope; useState resets per component instance.
        wrong_pattern: |
          function Counter() {
            const [count, setCount] = useState(0)
          }
        correct_pattern: |
          const count = createStore(0)
          function Counter() {
            const value = useSubscription(count)
          }
        source: docs/content/docs/index.mdx
        priority: HIGH
        status: active
      - mistake: Importing seitu/react in non-React code
        mechanism: React bindings are optional peer deps; core and web work without React.
        wrong_pattern: |
          import { useSubscription } from 'seitu/react'
          count.subscribe(console.log)
        correct_pattern: |
          import { createStore } from 'seitu'
          const count = createStore(0)
          count.subscribe(console.log)
        source: seitu/src/core/index.ts
        priority: MEDIUM
        status: active
      - mistake: Expecting actions or reducers
        mechanism: Seitu has no dispatch layer — mutate with .set() directly.
        wrong_pattern: |
          store.dispatch({ type: 'increment' })
        correct_pattern: |
          store.set(v => v + 1)
        source: maintainer interview
        priority: HIGH
        status: active
  - name: create-store
    slug: create-store
    domain: reactive-state
    description: Minimal in-memory reactive store with get/set/subscribe.
    type: core
    packages:
      - seitu
    covers:
      - createStore
    tasks:
      - add simple reactive state
      - subscribe outside components
    failure_modes:
      - mistake: Mutating object state in place
        mechanism: set() skips notification when the new value is the same reference (===).
        wrong_pattern: |
          store.set(prev => { prev.count++; return prev })
        correct_pattern: |
          store.set(prev => ({ ...prev, count: prev.count + 1 }))
        source: seitu/src/core/store.ts
        priority: CRITICAL
        status: active
      - mistake: Creating store inside a component
        mechanism: A new store per render loses shared state and leaks subscriptions.
        wrong_pattern: |
          function App() {
            const store = createStore(0)
          }
        correct_pattern: |
          const store = createStore(0)
          function App() {
            const value = useSubscription(store)
          }
        source: seitu-overview
        priority: CRITICAL
        status: active
        skills:
          - create-store
          - seitu-overview
          - use-subscription-react
      - mistake: Using JSON.stringify for change detection
        mechanism: Reference equality is the notification gate; stringify adds cost without fixing in-place mutation.
        wrong_pattern: |
          store.set(prev => prev)
        correct_pattern: |
          store.set(prev => ({ ...prev }))
        source: seitu/src/core/store.ts
        priority: MEDIUM
        status: active
  - name: create-schema-store
    slug: create-schema-store
    domain: reactive-state
    description: Schema-validated store with Standard Schema (Zod, Valibot, ArkType).
    type: core
    packages:
      - seitu
    covers:
      - createSchemaStore
    tasks:
      - validate in-memory state on read
      - recover from invalid stored shapes
    failure_modes:
      - mistake: Partial set without merge
        mechanism: set replaces the whole validated object; partial objects fail schema validation.
        wrong_pattern: |
          store.set({ count: 1 })
        correct_pattern: |
          store.set(prev => ({ ...prev, count: 1 }))
        source: seitu/src/core/schema-store.ts
        priority: HIGH
        status: active
      - mistake: Non-Standard Schema validator
        mechanism: validateSchema expects Standard Schema V1; plain functions throw.
        wrong_pattern: |
          schema: (v) => v.count > 0
        correct_pattern: |
          schema: z.object({ count: z.number() })
        source: seitu/src/validate.ts
        priority: HIGH
        status: active
      - mistake: Ignoring onValidationError for repair
        mechanism: Without a handler, invalid data silently falls back to defaultValue.
        wrong_pattern: |
          createSchemaStore({ schema, defaultValue })
        correct_pattern: |
          createSchemaStore({ schema, defaultValue, onValidationError: repairFn })
        source: docs/content/docs/core/schema-store.mdx
        priority: MEDIUM
        status: active
  - name: create-computed
    slug: create-computed
    domain: reactive-state
    description: Derived read-only values from one or many sources.
    type: core
    packages:
      - seitu
    covers:
      - createComputed
    tasks:
      - derive state from other subscribables
    failure_modes:
      - mistake: Recomputing manually in components
        mechanism: createComputed subscribes to sources and caches until they notify.
        wrong_pattern: |
          const sum = a.get() + b.get()
        correct_pattern: |
          const sum = createComputed([a, b], ([x, y]) => x + y)
        source: seitu/src/core/computed.ts
        priority: HIGH
        status: active
      - mistake: Creating computed inside render
        mechanism: New computed each render re-subscribes and loses memoization benefits.
        wrong_pattern: |
          function App() {
            const total = createComputed(store, s => s.a + s.b)
          }
        correct_pattern: |
          const total = createComputed(store, s => s.a + s.b)
        source: seitu/src/core/computed.ts
        priority: HIGH
        status: active
      - mistake: Writing to computed
        mechanism: Computed is read-only; use the source store's set().
        wrong_pattern: |
          sum.set(10)
        correct_pattern: |
          store.set({ a: 5, b: 5 })
        source: seitu/src/core/computed.ts
        priority: MEDIUM
        status: active
  - name: create-web-storage-value
    slug: create-web-storage-value
    domain: browser-integration
    description: Single-key localStorage/sessionStorage with schema validation.
    type: core
    packages:
      - seitu
    covers:
      - createWebStorageValue
    tasks:
      - persist one typed value to web storage
    failure_modes:
      - mistake: Accessing storage during SSR without defaults
        mechanism: Primitives return defaultValue when window is undefined — safe at module level.
        wrong_pattern: |
          if (typeof window !== 'undefined') {
            const v = createWebStorageValue({ ... })
          }
        correct_pattern: |
          const v = createWebStorageValue({ type: 'localStorage', key: 'x', schema, defaultValue })
        source: seitu/src/web/web-storage-value.ts
        priority: HIGH
        status: active
        skills:
          - create-web-storage-value
          - seitu-overview
      - mistake: Missing schema on standalone overload
        mechanism: Standalone overload requires schema and defaultValue.
        wrong_pattern: |
          createWebStorageValue({ type: 'localStorage', key: 'count' })
        correct_pattern: |
          createWebStorageValue({ type: 'localStorage', key: 'count', schema: z.number(), defaultValue: 0 })
        source: seitu/src/web/web-storage-value.ts
        priority: CRITICAL
        status: active
      - mistake: Creating new instance per render in React
        mechanism: Each instance uses a different storage subscription; use module singleton or useSubscription factory with deps.
        wrong_pattern: |
          useSubscription(createWebStorageValue({ key: 'x', ... }))
        correct_pattern: |
          useSubscription(() => createWebStorageValue({ key: 'x', ... }), { deps: [userId] })
        source: docs/content/docs/react/hooks.mdx
        priority: CRITICAL
        status: active
        skills:
          - create-web-storage-value
          - use-subscription-react
  - name: create-web-storage
    slug: create-web-storage
    domain: browser-integration
    description: Multi-key localStorage/sessionStorage with per-key schemas.
    type: core
    packages:
      - seitu
    covers:
      - createWebStorage
      - createWebStorageValue
    tasks:
      - persist multiple related keys
    failure_modes:
      - mistake: Mixing storage types on one instance
        mechanism: type is fixed at creation for the whole WebStorage instance.
        wrong_pattern: |
          storage.set({ key: 'a', type: 'sessionStorage' })
        correct_pattern: |
          createWebStorage({ type: 'localStorage', schemas, defaultValues })
        source: seitu/src/web/web-storage.ts
        priority: MEDIUM
        status: active
      - mistake: Key not in schemas map
        mechanism: Only declared keys are typed and validated.
        wrong_pattern: |
          storage.set({ unknown: 1 })
        correct_pattern: |
          createWebStorage({ schemas: { count: z.number() }, defaultValues: { count: 0 } })
        source: seitu/src/web/web-storage.ts
        priority: HIGH
        status: active
      - mistake: Expecting cross-tab sync automatically
        mechanism: storage event handling depends on implementation; verify subscribe fires on external changes.
        wrong_pattern: |
          // assumes other tabs trigger subscribe without storage listener
        correct_pattern: |
          storage.subscribe(v => syncUI(v))
        source: seitu/src/web/web-storage.ts
        priority: MEDIUM
        status: active
  - name: create-indexed-db-storage
    slug: create-indexed-db-storage
    domain: browser-integration
    description: Async multi-key IndexedDB persistence with cached sync reads.
    type: core
    packages:
      - seitu
    covers:
      - createIndexedDbStorage
    tasks:
      - persist large or async state in the browser
    failure_modes:
      - mistake: Treating set as synchronous
        mechanism: IndexedDB writes are async; get() returns cached value immediately.
        wrong_pattern: |
          await storage.set(data)
          expect(storage.get()).toEqual(persistedFromDb)
        correct_pattern: |
          storage.set(data)
          storage.subscribe(next => { /* react when cache updates */ })
        source: seitu/src/web/indexed-db-storage.ts
        priority: HIGH
        status: active
      - mistake: Using in Node without fake-indexeddb
        mechanism: IndexedDB is browser-only; tests need fake-indexeddb polyfill.
        wrong_pattern: |
          createIndexedDbStorage({ ... }) // in vitest without polyfill
        correct_pattern: |
          import 'fake-indexeddb/auto'
        source: seitu/src/web/indexed-db-storage.test.ts
        priority: MEDIUM
        status: active
      - mistake: Missing schemas for keys
        mechanism: Same as WebStorage — keys must be declared in schemas/defaultValues.
        wrong_pattern: |
          createIndexedDbStorage({ dbName: 'app' })
        correct_pattern: |
          createIndexedDbStorage({ dbName: 'app', schemas: { items: z.array(z.string()) }, defaultValues: { items: [] } })
        source: seitu/src/web/indexed-db-storage.ts
        priority: HIGH
        status: active
  - name: create-media-query
    slug: create-media-query
    domain: browser-integration
    description: Reactive CSS media query matches with SSR defaultMatches.
    type: core
    packages:
      - seitu
    covers:
      - createMediaQuery
    tasks:
      - react to viewport or prefers-* queries
    failure_modes:
      - mistake: Missing defaultMatches for SSR
        mechanism: get() returns false when window is undefined unless defaultMatches is set.
        wrong_pattern: |
          createMediaQuery({ query: '(min-width: 768px)' })
        correct_pattern: |
          createMediaQuery({ query: '(min-width: 768px)', defaultMatches: true })
        source: seitu/src/web/media-query.ts
        priority: CRITICAL
        status: active
        skills:
          - create-media-query
          - seitu-overview
      - mistake: Invalid media query string
        mechanism: Malformed queries throw at creation time in the browser.
        wrong_pattern: |
          createMediaQuery({ query: '(min-width: 768' })
        correct_pattern: |
          createMediaQuery({ query: '(min-width: 768px)' })
        source: seitu/src/web/media-query.ts
        priority: HIGH
        status: active
      - mistake: Creating query inside component each render
        mechanism: New matchMedia listener per render; use module-level singleton.
        wrong_pattern: |
          function Layout() {
            const mq = createMediaQuery({ query: '...' })
          }
        correct_pattern: |
          const isDesktop = createMediaQuery({ query: '(min-width: 768px)' })
        source: seitu-overview
        priority: HIGH
        status: active
  - name: create-is-online
    slug: create-is-online
    domain: browser-integration
    description: Reactive navigator.onLine with event listeners.
    type: core
    packages:
      - seitu
    covers:
      - createIsOnline
    tasks:
      - track online/offline status
    failure_modes:
      - mistake: Polling navigator.onLine manually
        mechanism: createIsOnline subscribes to online/offline events.
        wrong_pattern: |
          setInterval(() => setOnline(navigator.onLine), 1000)
        correct_pattern: |
          const online = createIsOnline()
          online.subscribe(v => setOnline(v))
        source: seitu/src/web/is-online.ts
        priority: MEDIUM
        status: active
      - mistake: Assuming onLine means reachable server
        mechanism: onLine is browser connectivity, not server health.
        wrong_pattern: |
          if (online.get()) fetch('/api') // always succeeds
        correct_pattern: |
          if (online.get()) fetch('/api').catch(handleOffline)
        source: docs/content/docs/web/is-online.mdx
        priority: MEDIUM
        status: active
      - mistake: Guarding creation with typeof window
        mechanism: Returns false when offline API unavailable; safe at module scope.
        wrong_pattern: |
          const online = typeof window !== 'undefined' ? createIsOnline() : null
        correct_pattern: |
          const online = createIsOnline()
        source: seitu/src/web/is-online.ts
        priority: LOW
        status: active
  - name: create-scroll-state
    slug: create-scroll-state
    domain: browser-integration
    description: Scroll position, edges, and remaining distance for an element.
    type: core
    packages:
      - seitu
    covers:
      - createScrollState
    tasks:
      - track scroll position reactively
    failure_modes:
      - mistake: Passing static element ref
        mechanism: element option accepts a getter so ref.current updates are tracked.
        wrong_pattern: |
          createScrollState({ element: ref.current })
        correct_pattern: |
          createScrollState({ element: () => ref.current, direction: 'vertical' })
        source: seitu/src/web/scroll-state.ts
        priority: CRITICAL
        status: active
        skills:
          - create-scroll-state
          - use-subscription-react
      - mistake: Creating scroll state without ref attached
        mechanism: Null element returns default scroll metrics.
        wrong_pattern: |
          createScrollState({ element: () => ref.current }) // ref never attached
        correct_pattern: |
          <div ref={ref}>...</div>
        source: seitu/src/web/scroll-state.ts
        priority: HIGH
        status: active
      - mistake: Module-level scroll state with dynamic element
        mechanism: Factory pattern in useSubscription recreates when element changes.
        wrong_pattern: |
          const scroll = createScrollState({ element: () => el })
        correct_pattern: |
          useSubscription(() => createScrollState({ element: () => ref.current }), { deps: [] })
        source: docs/content/docs/react/hooks.mdx
        priority: HIGH
        status: active
  - name: use-subscription-react
    slug: use-subscription-react
    domain: framework-bindings
    description: React hook for any Seitu primitive via useSyncExternalStore.
    type: framework
    packages:
      - seitu
    covers:
      - useSubscription
    tasks:
      - subscribe to Seitu state in React
    failure_modes:
      - mistake: Missing use client directive
        mechanism: Hook uses client-only APIs; fails in RSC server components.
        wrong_pattern: |
          export default function Page() {
            const v = useSubscription(store)
          }
        correct_pattern: |
          'use client'
          export default function Page() {
            const v = useSubscription(store)
          }
        source: seitu/src/react/hooks.ts
        priority: CRITICAL
        status: active
      - mistake: Factory without deps when props change
        mechanism: Factory runs once unless deps array changes.
        wrong_pattern: |
          useSubscription(() => createWebStorageValue({ key: userId, ... }))
        correct_pattern: |
          useSubscription(() => createWebStorageValue({ key: userId, ... }), { deps: [userId] })
        source: seitu/src/react/hooks.ts
        priority: CRITICAL
        status: active
      - mistake: Using useEffect to subscribe manually
        mechanism: useSubscription handles subscribe/unsubscribe and concurrent safety.
        wrong_pattern: |
          useEffect(() => store.subscribe(setV), [])
        correct_pattern: |
          const v = useSubscription(store)
        source: seitu/src/react/hooks.ts
        priority: HIGH
        status: active
  - name: use-subscription-vue
    slug: use-subscription-vue
    domain: framework-bindings
    description: Vue composable returning readonly ShallowRef.
    type: framework
    packages:
      - seitu
    covers:
      - useSubscription
    tasks:
      - subscribe to Seitu state in Vue
    failure_modes:
      - mistake: Destructuring the returned ref
        mechanism: Return value is a ShallowRef; destructuring loses reactivity.
        wrong_pattern: |
          const { value } = useSubscription(store)
        correct_pattern: |
          const count = useSubscription(store)
          // count.value in script, count in template
        source: seitu/src/vue/composables.ts
        priority: HIGH
        status: active
      - mistake: Passing plain getter without factory semantics
        mechanism: Getter form creates subscription once on first run.
        wrong_pattern: |
          useSubscription(() => expensive()) // expecting re-run each access
        correct_pattern: |
          const data = useSubscription(computed(() => createStore(0)))
        source: seitu/src/vue/composables.ts
        priority: MEDIUM
        status: active
      - mistake: Importing from seitu/react in Vue
        mechanism: Vue apps must use seitu/vue composable.
        wrong_pattern: |
          import { useSubscription } from 'seitu/react'
        correct_pattern: |
          import { useSubscription } from 'seitu/vue'
        source: seitu/src/vue/index.ts
        priority: CRITICAL
        status: active
  - name: use-subscription-solid
    slug: use-subscription-solid
    domain: framework-bindings
    description: Solid primitive returning an Accessor for any Seitu primitive.
    type: framework
    packages:
      - seitu
    covers:
      - useSubscription
    tasks:
      - subscribe to Seitu state in Solid
    failure_modes:
      - mistake: Reading the accessor without calling it
        mechanism: useSubscription returns a Solid Accessor; it must be called to read and track.
        wrong_pattern: |
          const value = useSubscription(store)
          return <div>{value}</div>
        correct_pattern: |
          const value = useSubscription(store)
          return <div>{value()}</div>
        source: seitu/src/solid/hooks.ts
        priority: CRITICAL
        status: active
      - mistake: Passing reactive props directly instead of a getter
        mechanism: Reading props outside a tracked scope loses reactivity; the getter form re-subscribes.
        wrong_pattern: |
          useSubscription(props.store)
        correct_pattern: |
          useSubscription(() => props.store)
        source: seitu/src/solid/hooks.ts
        priority: HIGH
        status: active
      - mistake: Importing from seitu/react in Solid
        mechanism: Solid apps must use the seitu/solid primitive; the React hook relies on useSyncExternalStore.
        wrong_pattern: |
          import { useSubscription } from 'seitu/react'
        correct_pattern: |
          import { useSubscription } from 'seitu/solid'
        source: seitu/src/solid/index.ts
        priority: CRITICAL
        status: active
  - name: subscription-solid
    slug: subscription-solid
    domain: framework-bindings
    description: Render-prop component alternative to useSubscription for Solid.
    type: framework
    packages:
      - seitu
    covers:
      - Subscription
    tasks:
      - subscribe via component children render prop in Solid
    failure_modes:
      - mistake: Treating children's argument as a value, not an accessor
        mechanism: The children function runs once and receives a Solid Accessor; call it inside JSX.
        wrong_pattern: |
          <Subscription value={store}>{value => <div>{value.count}</div>}</Subscription>
        correct_pattern: |
          <Subscription value={store}>{value => <div>{value().count}</div>}</Subscription>
        source: seitu/src/solid/components.ts
        priority: CRITICAL
        status: active
      - mistake: Preferring the component over the primitive without reason
        mechanism: useSubscription is simpler for most cases; Subscription is for render-prop composition.
        wrong_pattern: |
          <Subscription value={s}>{v => <Child value={v()} />}</Subscription>
        correct_pattern: |
          const v = useSubscription(s); return <Child value={v()} />
        source: docs/content/docs/solid/components.mdx
        priority: LOW
        status: active
      - mistake: Importing from seitu/react in Solid
        mechanism: The React component relies on React internals; Solid apps must use seitu/solid.
        wrong_pattern: |
          import { Subscription } from 'seitu/react'
        correct_pattern: |
          import { Subscription } from 'seitu/solid'
        source: seitu/src/solid/index.ts
        priority: CRITICAL
        status: active
  - name: use-subscription-svelte
    slug: use-subscription-svelte
    domain: framework-bindings
    description: Svelte binding returning a Readable store for any Seitu primitive.
    type: framework
    packages:
      - seitu
    covers:
      - useSubscription
    tasks:
      - subscribe to Seitu state in Svelte
    failure_modes:
      - mistake: Reading the store without the `$` prefix
        mechanism: useSubscription returns a Svelte store; the $ prefix auto-subscribes and reads the value.
        wrong_pattern: |
          <div>{value}</div>
        correct_pattern: |
          <div>{$value}</div>
        source: seitu/src/svelte/hooks.ts
        priority: CRITICAL
        status: active
      - mistake: Passing a factory expecting reactivity to a changing source
        mechanism: The factory is a one-time initializer; it does not re-run when external values change.
        wrong_pattern: |
          const value = useSubscription(() => createWebStorageValue({ key: `user:${id}`, ... }))
        correct_pattern: |
          const value = useSubscription(createWebStorageValue({ key: `user:${id}`, ... }))
        source: seitu/src/svelte/hooks.ts
        priority: MEDIUM
        status: active
      - mistake: Importing from seitu/react in Svelte
        mechanism: The React hook relies on useSyncExternalStore; Svelte apps must use seitu/svelte.
        wrong_pattern: |
          import { useSubscription } from 'seitu/react'
        correct_pattern: |
          import { useSubscription } from 'seitu/svelte'
        source: seitu/src/svelte/index.ts
        priority: CRITICAL
        status: active
  - name: create-debounced
    slug: create-debounced
    domain: reactive-state
    description: Debounce updates from a source subscribable.
    type: core
    packages:
      - seitu
    covers:
      - createDebounced
    tasks:
      - rate-limit reactive updates
    failure_modes:
      - mistake: Debouncing the source instead of wrapping it
        mechanism: createDebounced wraps a Readable & Subscribable; mutating the source bypasses debounce.
        wrong_pattern: |
          const raw = createStore(0)
          setTimeout(() => raw.set(v), 300)
        correct_pattern: |
          const debounced = createDebounced(raw, 300)
        source: seitu/src/core/debounced.ts
        priority: HIGH
        status: active
      - mistake: Expecting immediate get after source change
        mechanism: get() returns last emitted value until wait elapses.
        wrong_pattern: |
          source.set(1); debounced.get() // expects 1 immediately
        correct_pattern: |
          debounced.subscribe(v => console.log(v))
        source: seitu/src/core/debounced.ts
        priority: MEDIUM
        status: active
      - mistake: Zero or negative wait
        mechanism: Invalid wait breaks timing expectations.
        wrong_pattern: |
          createDebounced(source, 0)
        correct_pattern: |
          createDebounced(source, 300)
        source: seitu/src/core/debounced.ts
        priority: LOW
        status: active
  - name: create-throttled
    slug: create-throttled
    domain: reactive-state
    description: Throttle updates from a source subscribable.
    type: core
    packages:
      - seitu
    covers:
      - createThrottled
    tasks:
      - rate-limit reactive updates
    failure_modes:
      - mistake: Using debounce for scroll-like high-frequency events
        mechanism: Throttle emits at most once per interval; debounce waits for quiet period.
        wrong_pattern: |
          createDebounced(scrollSource, 16)
        correct_pattern: |

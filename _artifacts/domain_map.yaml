      - mistake: Rapid calls expecting every result
        mechanism: Throttle drops intermediate invocations within the wait window.
        wrong_pattern: |
          for (let i = 0; i < 100; i++) throttledFn(i)
        correct_pattern: |
          throttledFn(i); throttledFn.subscribe(v => latest = v)

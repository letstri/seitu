tensions:
  - name: Module singleton simplicity vs per-user dynamic keys
    skills:
      - create-web-storage-value
      - use-subscription-react
    description: Module-level primitives are ergonomic but wrong for prop-driven storage keys.
    implication: Agents create one global storage key when userId or route param requires per-instance factories with deps.
  - name: SSR safety vs accurate initial UI
    skills:
      - create-media-query
      - seitu-overview
    description: defaultMatches trades hydration mismatch risk against SSR default accuracy.
    implication: Agents omit defaultMatches and get false on server for all breakpoints.

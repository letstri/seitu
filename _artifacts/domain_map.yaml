        mechanism: Same as hook — factory recreates only when React remounts.
        wrong_pattern: |
          <Subscription source={() => createStore(prop)}>{...}</Subscription>
        correct_pattern: |
          <Subscription key={prop} source={() => createStore(prop)}>{...}</Subscription>
        source: seitu/src/react/components.tsx
        priority: HIGH
